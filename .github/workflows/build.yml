name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build bare-metal-led
        run: |
          if [ -f bare-metal-led/Makefile ]; then
            cd bare-metal-led && make
          else
            echo "Makefile not yet present — skipping build (pre-P01)"
            exit 0
          fi

      - name: Check build size
        run: |
          if [ -f bare-metal-led/build/firmware.elf ]; then
            arm-none-eabi-size bare-metal-led/build/firmware.elf
          else
            echo "No firmware.elf — skipping size check (pre-P01)"
          fi
